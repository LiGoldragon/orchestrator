[workspace]
name = "orchestrator-integration"
prefix = "oit"
install_agent_hooks = []

[daemon]
patrol_interval = "250ms"
max_restarts = 3
restart_window = "1m"
shutdown_timeout = "2s"

[orders]
skip = [
  "beads-health",
  "cross-rig-deps",
  "digest-generate",
  "dolt-gc-nudge",
  "dolt-health",
  "dolt-remotes-patrol",
  "gate-sweep",
  "mol-dog-backup",
  "mol-dog-compactor",
  "mol-dog-doctor",
  "mol-dog-jsonl",
  "mol-dog-phantom-db",
  "mol-dog-reaper",
  "mol-dog-stale-db",
  "orphan-sweep",
  "prune-branches",
  "spawn-storm-detect",
  "wisp-compact",
]

[providers.codex-live]
base = ""
command = "codex"
args = ["exec", "--ignore-user-config", "--skip-git-repo-check", "--dangerously-bypass-approvals-and-sandbox", "--model", "gpt-5.4-nano", "-c", "model_reasoning_effort=low"]
prompt_mode = "arg"
ready_delay_ms = 3000
process_names = ["codex", "codex-raw"]
supports_hooks = false
instructions_file = "AGENTS.md"

[[agent]]
name = "mayor"
start_command = "bash \"$GC_CITY/agents/cascade-mail-recorder/run.sh\""
prompt_mode = "none"
max_active_sessions = 1
process_names = ["bash", "sh"]

[[agent]]
name = "cascade-tester-one"
provider = "codex-live"
prompt_template = "agents/cascade-test-agent/prompt.template.md"
max_active_sessions = 1
process_names = ["codex", "codex-raw"]
scale_check = "gc --city {{.CityRoot}} bd ready --metadata-field gc.routed_to=cascade-tester-one --unassigned --json 2>/dev/null | jq 'length' 2>/dev/null || echo 0"

[[agent]]
name = "cascade-tester-two"
provider = "codex-live"
prompt_template = "agents/cascade-test-agent/prompt.template.md"
max_active_sessions = 1
process_names = ["codex", "codex-raw"]
scale_check = "gc --city {{.CityRoot}} bd ready --metadata-field gc.routed_to=cascade-tester-two --unassigned --json 2>/dev/null | jq 'length' 2>/dev/null || echo 0"

[[agent]]
name = "cascade-tester-three"
provider = "codex-live"
prompt_template = "agents/cascade-test-agent/prompt.template.md"
max_active_sessions = 1
process_names = ["codex", "codex-raw"]
scale_check = "gc --city {{.CityRoot}} bd ready --metadata-field gc.routed_to=cascade-tester-three --unassigned --json 2>/dev/null | jq 'length' 2>/dev/null || echo 0"

[[named_session]]
template = "mayor"
mode = "on_demand"

[[named_session]]
template = "cascade-tester-one"
mode = "on_demand"

[[named_session]]
template = "cascade-tester-two"
mode = "on_demand"

[[named_session]]
template = "cascade-tester-three"
mode = "on_demand"
